<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS 업로드</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    padding: 10px;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f5f5f5;
  }
  h1 {
    font-size: 20px;
    margin-bottom: 15px;
  }
  .btn-row {
    display: flex;
    align-items: center;
    margin: 8px 0;
  }
  .btn-label {
    width: 70px;
    font-size: 14px;
    margin-right: 8px;
  }
  button {
    padding: 6px 12px;
    margin: 0 3px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    background: #007bff;
    color: #fff;
    transition: background 0.2s;
  }
  button:hover {
    background: #0056b3;
  }
</style>
</head>
<body>
  <h1>GPS 업로드 조정</h1>

  <div class="btn-row">
    <div class="btn-label">줌</div>
    <button id="zoomInBtn">+</button>
    <button id="zoomOutBtn">-</button>
  </div>

  <div class="btn-row">
    <div class="btn-label">투명도</div>
    <button id="opacityUpBtn">+</button>
    <button id="opacityDownBtn">-</button>
  </div>

  <div class="btn-row">
    <div class="btn-label">크기</div>
    <button id="sizeUpBtn">+</button>
    <button id="sizeDownBtn">-</button>
  </div>

  <div class="btn-row">
    <div class="btn-label">테마</div>
    <button id="lightBtn">☀️ 라이트</button>
    <button id="darkBtn">🌙 다크</button>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

// ✅ Firebase 설정
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "SENDER_ID",
  appId: "APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 현재 값 저장용
let mapLevel = 3;
let opacity = 1;
let size = 100;

// 초기값 로드
async function loadSettings() {
  const snap = await get(ref(db, "location/settings"));
  if (snap.exists()) {
    const data = snap.val();
    mapLevel = data.mapLevel ?? 3;
    opacity = data.opacity ?? 1;
    size = data.size ?? 100;
  }
}
loadSettings();

// 업로드 함수
function uploadSettings() {
  set(ref(db, "location/settings"), {
    mapLevel,
    opacity,
    size
  });
}

// 버튼 이벤트
document.getElementById("zoomInBtn").onclick = () => { mapLevel++; uploadSettings(); };
document.getElementById("zoomOutBtn").onclick = () => { mapLevel--; uploadSettings(); };
document.getElementById("opacityUpBtn").onclick = () => { opacity = Math.min(1, opacity + 0.1); uploadSettings(); };
document.getElementById("opacityDownBtn").onclick = () => { opacity = Math.max(0, opacity - 0.1); uploadSettings(); };
document.getElementById("sizeUpBtn").onclick = () => { size += 10; uploadSettings(); };
document.getElementById("sizeDownBtn").onclick = () => { size = Math.max(10, size - 10); uploadSettings(); };

// ✅ 테마 버튼
document.getElementById("lightBtn").onclick = () => {
  set(ref(db, "location/theme"), { value: "light" });
};
document.getElementById("darkBtn").onclick = () => {
  set(ref(db, "location/theme"), { value: "dark" });
};
</script>
</body>
</html>
