<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GPS 업로드</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    button { 
      font-size: 24px;
      margin: 10px;
      padding: 15px 25px;
      border-radius: 10px;
      cursor: pointer;
    }
    #level-display { font-size: 20px; font-weight: bold; }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAQGtOEcxFxl9FV7NASLgxLDc23u2vzS_0",
      authDomain: "mygps-11798.firebaseapp.com",
      databaseURL: "https://mygps-11798-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "mygps-11798",
      storageBucket: "mygps-11798.firebasestorage.app",
      messagingSenderId: "271371741627",
      appId: "1:271371741627:web:642901f43c5ad57d80bc9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.mapLevel = 4;

    function uploadLocation(lat, lng) {
      set(ref(db, "location/current"), {
        lat: lat,
        lng: lng,
        level: window.mapLevel,
        timestamp: Date.now()
      });
    }

    window.onload = function() {
      if (navigator.geolocation) {
        navigator.geolocation.watchPosition(
          (pos) => uploadLocation(pos.coords.latitude, pos.coords.longitude),
          (err) => console.error(err),
          { enableHighAccuracy: true }
        );
      } else {
        alert("GPS를 지원하지 않는 기기입니다.");
      }

      document.getElementById('zoom-in').onclick = () => {
        if (window.mapLevel > 1) window.mapLevel--;
      };
      document.getElementById('zoom-out').onclick = () => {
        window.mapLevel++;
      };
    };
  </script>
</head>
<body>
  <h2>📍 GPS 업로드 중...</h2>
  <div>
    <button id="zoom-in">🔍 확대</button>
    <button id="zoom-out">🔎 축소</button>
    <p>현재 전송 레벨: <span id="level-display">4</span></p>
  </div>

  <script>
    const levelDisplay = document.getElementById('level-display');
    setInterval(() => levelDisplay.textContent = window.mapLevel, 200);
  </script>
</body>
</html>
