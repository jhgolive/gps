<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS 업로드</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  padding: 20px 10px;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #f0f0f0;
  text-align: center;
  user-select: none;
}
#status-text { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
.buttons { display: flex; gap: 10px; margin-top: 20px; }
.btn-container {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.btn-label {
  margin-bottom: 5px;
  font-size: 16px;
  font-weight: bold;
  color: #333;
  user-select: none;
}
.buttons button {
  width: 60px; height: 60px; font-size: 32px;
  border: none; border-radius: 8px; background: #000033; color: #fff; cursor: pointer;
  user-select: none;
  margin-bottom: 5px;
}
.buttons button:active { background: #000022; }
</style>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQGtOEcxFxl9FV7NASLgxLDc23u2vzS_0",
  authDomain: "mygps-11798.firebaseapp.com",
  databaseURL: "https://mygps-11798-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mygps-11798",
  storageBucket: "mygps-11798.firebasestorage.app",
  messagingSenderId: "271371741627",
  appId: "1:271371741627:web:642901f43c5ad57d80bc9e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.mapLevel = 4;
window.borderRadius = 0;
const MAX_RADIUS = 160;
let prevPos = null;
const MIN_MOVE = 0.00005;

function calculateHeading(lat1, lng1, lat2, lng2) {
  const dLon = (lng2 - lng1) * Math.PI / 180;
  const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
  const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
            Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
  let brng = Math.atan2(y, x) * 180 / Math.PI;
  return (brng + 360) % 360;
}

function distance(lat1, lng1, lat2, lng2) {
  return Math.sqrt((lat2 - lat1)**2 + (lng2 - lng1)**2);
}

function uploadLocation(lat, lng, heading) {
  set(ref(db, "location/current"), {
    lat, lng, heading,
    level: window.mapLevel,
    borderRadius: window.borderRadius,
    timestamp: Date.now()
  });
}

window.onload = function() {
  const zoomInBtn = document.getElementById('zoom-in');
  const zoomOutBtn = document.getElementById('zoom-out');
  const rounderInBtn = document.getElementById('rounder-in');
  const rounderOutBtn = document.getElementById('rounder-out');
  const levelLabel = document.getElementById('level-label');
  const radiusLabel = document.getElementById('radius-label');

  function updateDisplays() {
    levelLabel.textContent = window.mapLevel;
    radiusLabel.textContent = window.borderRadius;
  }
  updateDisplays();

  const radiusIncrement = 10;
  const zoomIncrement = 1;

  let intervalZoomIn = null;
  let intervalZoomOut = null;
  let intervalRadiusIn = null;
  let intervalRadiusOut = null;

  function changeZoom(delta) { window.mapLevel = Math.max(1, window.mapLevel + delta); updateDisplays(); }
  function changeRadius(delta) { 
    window.borderRadius = Math.min(MAX_RADIUS, Math.max(0, window.borderRadius + delta));
    updateDisplays();
  }

  // Zoom 버튼 이벤트
  zoomInBtn.addEventListener('click', () => changeZoom(-zoomIncrement));
  zoomOutBtn.addEventListener('click', () => changeZoom(zoomIncrement));
  zoomInBtn.addEventListener('mousedown', () => { intervalZoomIn = setInterval(()=>changeZoom(-zoomIncrement), 100); });
  zoomOutBtn.addEventListener('mousedown', () => { intervalZoomOut = setInterval(()=>changeZoom(zoomIncrement), 100); });
  zoomInBtn.addEventListener('mouseup', () => clearInterval(intervalZoomIn));
  zoomOutBtn.addEventListener('mouseup', () => clearInterval(intervalZoomOut));
  zoomInBtn.addEventListener('mouseleave', () => clearInterval(intervalZoomIn));
  zoomOutBtn.addEventListener('mouseleave', () => clearInterval(intervalZoomOut));
  zoomInBtn.addEventListener('touchstart', () => { intervalZoomIn = setInterval(()=>changeZoom(-zoomIncrement), 100); });
  zoomOutBtn.addEventListener('touchstart', () => { intervalZoomOut = setInterval(()=>changeZoom(zoomIncrement), 100); });
  zoomInBtn.addEventListener('touchend', () => clearInterval(intervalZoomIn));
  zoomOutBtn.addEventListener('touchend', () => clearInterval(intervalZoomOut));

  // Radius 버튼 이벤트
  rounderInBtn.addEventListener('click', () => changeRadius(radiusIncrement));
  rounderOutBtn.addEventListener('click', () => changeRadius(-radiusIncrement));
  rounderInBtn.addEventListener('mousedown', () => { intervalRadiusIn = setInterval(()=>changeRadius(radiusIncrement), 100); });
  rounderOutBtn.addEventListener('mousedown', () => { intervalRadiusOut = setInterval(()=>changeRadius(-radiusIncrement), 100); });
  rounderInBtn.addEventListener('mouseup', () => clearInterval(intervalRadiusIn));
  rounderOutBtn.addEventListener('mouseup', () => clearInterval(intervalRadiusOut));
  rounderInBtn.addEventListener('mouseleave', () => clearInterval(intervalRadiusIn));
  rounderOutBtn.addEventListener('mouseleave', () => clearInterval(intervalRadiusOut));
  rounderInBtn.addEventListener('touchstart', () => { intervalRadiusIn = setInterval(()=>changeRadius(radiusIncrement), 100); });
  rounderOutBtn.addEventListener('touchstart', () => { intervalRadiusOut = setInterval(()=>changeRadius(-radiusIncrement), 100); });
  rounderInBtn.addEventListener('touchend', () => clearInterval(intervalRadiusIn));
  rounderOutBtn.addEventListener('touchend', () => clearInterval(intervalRadiusOut));

  // GPS 업로드
  if(navigator.geolocation){
    navigator.geolocation.watchPosition(
      (pos) => {
        let heading = pos.coords.heading;
        if(prevPos){
          const moveDist = distance(prevPos.lat, prevPos.lng, pos.coords.latitude, pos.coords.longitude);
          if(moveDist >= MIN_MOVE){
            if(!heading || heading===0){
              heading = calculateHeading(prevPos.lat, prevPos.lng, pos.coords.latitude, pos.coords.longitude);
            }
            prevPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          } else {
            heading = heading || prevPos.heading || 0;
          }
        } else {
          prevPos = { lat: pos.coords.latitude, lng: pos.coords.longitude, heading: heading || 0 };
        }
        uploadLocation(pos.coords.latitude, pos.coords.longitude, heading);
      },
      (err) => console.error(err),
      { enableHighAccuracy: true }
    );
  } else { alert("GPS를 지원하지 않는 기기입니다."); }
};
</script>
</head>
<body>
  <div id="status-text">📍 GPS 업로드 중...</div>
  <div class="buttons">
    <div class="btn-container">
      <div class="btn-label" id="level-label">4</div>
      <button id="rounder-in">○</button>
      <button id="zoom-in">+</button>
    </div>
    <div class="btn-container">
      <div class="btn-label">&nbsp;</div>
      <button id="rounder-out">□</button>
      <button id="zoom-out">-</button>
    </div>
    <div class="btn-container">
      <div class="btn-label" id="radius-label">0</div>
    </div>
  </div>
</body>
</html>
