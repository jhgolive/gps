<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GPS 업로드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 구글 지도 API (본인 API 키 넣기) -->
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // 🔹 Firebase 설정 (본인 프로젝트 정보 넣기)
    const firebaseConfig = {
      apiKey: "YOUR_FIREBASE_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT.firebaseio.com",
      projectId: "YOUR_PROJECT",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "SENDER_ID",
      appId: "APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let map, marker;

    // 구글맵 라이트 모드 스타일
    const lightModeStyle = [];

    // 구글맵 다크 모드 스타일
    const darkModeStyle = [
      { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
      { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
      { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
      {
        featureType: "road",
        elementType: "geometry",
        stylers: [{ color: "#38414e" }]
      },
      {
        featureType: "water",
        elementType: "geometry",
        stylers: [{ color: "#17263c" }]
      }
    ];

    // 지도 초기화
    function initMap(lat = 37.5665, lng = 126.9780) {
      const center = { lat, lng };
      map = new google.maps.Map(document.getElementById("map"), {
        zoom: 14,
        center,
        styles: lightModeStyle
      });

      marker = new google.maps.Marker({
        position: center,
        map: map,
        title: "내 위치"
      });
    }

    // GPS 업로드
    function uploadLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;

          // DB 업로드
          set(ref(db, "gps"), {
            lat: lat,
            lng: lng,
            timestamp: Date.now()
          });

          // 지도 위치 갱신
          const newPos = { lat, lng };
          map.setCenter(newPos);
          marker.setPosition(newPos);

          console.log("업로드됨:", lat, lng);
        });
      } else {
        alert("GPS를 지원하지 않습니다.");
      }
    }

    // 버튼 이벤트
    window.onload = () => {
      initMap();

      // 페이지 로드될 때 첫 업로드
      uploadLocation();

      // 5초마다 위치 업로드
      setInterval(uploadLocation, 5000);

      // 라이트 모드 버튼
      document.getElementById("lightBtn").addEventListener("click", () => {
        document.body.className = "light";
        map.setOptions({ styles: lightModeStyle });
      });

      // 다크 모드 버튼
      document.getElementById("darkBtn").addEventListener("click", () => {
        document.body.className = "dark";
        map.setOptions({ styles: darkModeStyle });
      });
    };
  </script>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.3s, color 0.3s;
    }
    #map {
      width: 100%;
      height: 70vh;
      margin-bottom: 10px;
      border-radius: 10px;
    }
    .btn-group {
      display: flex;
      gap: 10px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    /* 라이트 모드 */
    body.light {
      background: #ffffff;
      color: #000000;
    }
    body.light button {
      background: #333;
      color: #fff;
    }
    body.light button:hover {
      background: #555;
    }

    /* 다크 모드 */
    body.dark {
      background: #121212;
      color: #e0e0e0;
    }
    body.dark button {
      background: #f1f1f1;
      color: #000;
    }
    body.dark button:hover {
      background: #ddd;
    }
  </style>
</head>
<body class="light">
  <h2>GPS 업로드 페이지</h2>
  <div id="map"></div>

  <div class="btn-group">
    <button id="lightBtn">라이트 모드</button>
    <button id="darkBtn">다크 모드</button>
  </div>
</body>
</html>
