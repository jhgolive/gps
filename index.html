<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS 업로드</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    padding: 10px;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f5f5f5;
  }
  #status-text {
    margin: 10px;
    font-size: 16px;
    font-weight: bold;
  }
  .btn-row {
    margin: 5px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .btn-label {
    min-width: 70px;
    text-align: right;
    font-size: 14px;
  }
  button {
    padding: 8px 14px;
    font-size: 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #007bff;
    color: white;
  }
  button:hover {
    background: #0056b3;
  }
</style>
</head>
<body>
  <div id="status-text">GPS 업로드 중...</div>

  <!-- ✅ 기존 버튼들 -->
  <div class="btn-row">
    <div class="btn-label">업로드</div>
    <button id="start-btn">START</button>
    <button id="stop-btn">STOP</button>
  </div>

  <div class="btn-row">
    <div class="btn-label">리셋</div>
    <button id="reset-btn">RESET</button>
  </div>

  <div class="btn-row">
    <div class="btn-label">컨트롤</div>
    <button id="control-btn">CONTROL</button>
  </div>

  <!-- ✅ 새로 추가된 다크모드 버튼 -->
  <div class="btn-row">
    <div class="btn-label">Dark</div>
    <button id="dark-on">ON</button>
    <button id="dark-off">OFF</button>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8swteRAgf-r_tS_uncv_IWJKcGghanrY",
  authDomain: "fir-test-8a2c5.firebaseapp.com",
  databaseURL: "https://fir-test-8a2c5-default-rtdb.firebaseio.com",
  projectId: "fir-test-8a2c5",
  storageBucket: "fir-test-8a2c5.appspot.com",
  messagingSenderId: "775632947783",
  appId: "1:775632947783:web:ee179681cd7e50da457e7d"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ✅ 다크모드 ON/OFF
function setDarkMode(value) {
  set(ref(db, "location/settings/darkMode"), value);
}

window.onload = function () {
  // ✅ 기존 버튼 이벤트
  document.getElementById("start-btn").addEventListener("click", () => {
    document.getElementById("status-text").innerText = "업로드 시작됨";
    // 업로드 시작 로직 ...
  });

  document.getElementById("stop-btn").addEventListener("click", () => {
    document.getElementById("status-text").innerText = "업로드 중지됨";
    // 업로드 중지 로직 ...
  });

  document.getElementById("reset-btn").addEventListener("click", () => {
    document.getElementById("status-text").innerText = "리셋됨";
    // 리셋 로직 ...
  });

  document.getElementById("control-btn").addEventListener("click", () => {
    document.getElementById("status-text").innerText = "컨트롤 동작";
    // 컨트롤 버튼 로직 ...
  });

  // ✅ 다크모드 버튼 이벤트
  document.getElementById("dark-on").addEventListener("click", () => setDarkMode(true));
  document.getElementById("dark-off").addEventListener("click", () => setDarkMode(false));
};
</script>
</body>
</html>
