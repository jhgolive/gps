<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS 업로드</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  padding: 20px 10px;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #f0f0f0;
  text-align: center;
  user-select: none;
}
#status-text { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
.btn-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 15px;
}
.btn-label {
  font-size: 18px;
  width: 50px;
  text-align: right;
  font-weight: bold;
}
.buttons button {
  width: 60px;
  height: 60px;
  font-size: 32px;
  border: none;
  border-radius: 8px;
  background: #000033;
  color: #fff;
  cursor: pointer;
  user-select: none;
}
.buttons button:active { background: #000022; }
</style>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQGtOEcxFxl9FV7NASLgxLDc23u2vzS_0",
  authDomain: "mygps-11798.firebaseapp.com",
  databaseURL: "https://mygps-11798-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mygps-11798",
  storageBucket: "mygps-11798.firebasestorage.app",
  messagingSenderId: "271371741627",
  appId: "1:271371741627:web:642901f43c5ad57d80bc9e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.mapLevel = 4;
window.borderRadius = 0;
window.mapOpacity = 1;
window.mapSize = 300;
const MAX_SIZE = 600;
const MIN_SIZE = 100;

let prevPos = null;
const MIN_MOVE = 0.00005;

function distance(lat1, lng1, lat2, lng2) {
  return Math.sqrt((lat2 - lat1)**2 + (lng2 - lng1)**2);
}

function calculateHeading(lat1, lng1, lat2, lng2) {
  const dLon = (lng2 - lng1) * Math.PI / 180;
  const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
  const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
            Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
  let brng = Math.atan2(y, x) * 180 / Math.PI;
  return (brng + 360) % 360;
}

function uploadLocation(lat, lng, heading) {
  set(ref(db, "location/current"), {
    lat, lng, heading,
    level: window.mapLevel,
    borderRadius: window.borderRadius,
    opacity: window.mapOpacity,
    size: window.mapSize,
    timestamp: Date.now()
  });
}

window.onload = function() {
  const sizeUpBtn = document.getElementById('sizeUp');
  const sizeDownBtn = document.getElementById('sizeDown');
  const sizeLabel = document.getElementById('size-label');

  function updateDisplays() {
    sizeLabel.textContent = window.mapSize;
  }
  updateDisplays();

  const intervalDelay = 200;
  const startDelay = 500;
  const sizeIncrement = 20;

  function changeSize(delta) {
    window.mapSize = Math.min(MAX_SIZE, Math.max(MIN_SIZE, window.mapSize + delta));
    updateDisplays();
    // 기존 위치 그대로 보내기
    if(prevPos) uploadLocation(prevPos.lat, prevPos.lng, prevPos.heading || 0);
  }

  function addHoldEvent(button, delta, func) {
    let interval = null;
    let timeout = null;
    let longPress = false;
    const startChange = () => {
      longPress = true;
      interval = setInterval(() => func(delta), intervalDelay);
    };
    button.addEventListener('mousedown', () => {
      longPress = false;
      timeout = setTimeout(startChange, startDelay);
    });
    button.addEventListener('mouseup', () => {
      clearTimeout(timeout);
      clearInterval(interval);
      if (!longPress) func(delta);
    });
    button.addEventListener('mouseleave', () => {
      clearTimeout(timeout);
      clearInterval(interval);
    });
    button.addEventListener('touchstart', (e) => {
      e.preventDefault();
      longPress = false;
      timeout = setTimeout(startChange, startDelay);
    });
    button.addEventListener('touchend', () => {
      clearTimeout(timeout);
      clearInterval(interval);
      if (!longPress) func(delta);
    });
  }

  addHoldEvent(sizeUpBtn, sizeIncrement, changeSize);
  addHoldEvent(sizeDownBtn, -sizeIncrement, changeSize);

  if(navigator.geolocation){
    navigator.geolocation.watchPosition(
      (pos) => {
        let heading = pos.coords.heading;
        if(prevPos){
          const moveDist = distance(prevPos.lat, prevPos.lng, pos.coords.latitude, pos.coords.longitude);
          if(moveDist >= MIN_MOVE){
            if(!heading || heading===0){
              heading = calculateHeading(prevPos.lat, prevPos.lng, pos.coords.latitude, pos.coords.longitude);
            }
            prevPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          } else {
            heading = heading || prevPos.heading || 0;
          }
        } else {
          prevPos = { lat: pos.coords.latitude, lng: pos.coords.longitude, heading: heading || 0 };
        }
        uploadLocation(pos.coords.latitude, pos.coords.longitude, heading);
      },
      (err) => console.error(err),
      { enableHighAccuracy: true }
    );
  } else { alert("GPS를 지원하지 않는 기기입니다."); }
};
</script>
</head>
<body>
  <div id="status-text">GPS 업로드 중...</div>

  <div class="btn-row">
    <div class="btn-label" id="size-label">300</div>
    <button id="sizeUp">▲</button>
    <button id="sizeDown">▼</button>
  </div>
</body>
</html>
