<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GPS 업로드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 20px 10px;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f0f0;
      color: #333333;
      text-align: center;
      box-sizing: border-box;
    }

    #status-text {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #333333;
    }

    #level-display {
      font-size: 60px;
      font-weight: bold;
      color: #333333;
      margin-bottom: 5px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 2px;
      margin-bottom: 20px;
    }

    button {
      width: 100px;   /* 버튼 폭 약간 키움 */
      height: 100px;  /* 정사각형 유지 */
      font-size: 60px; /* 글자 크기 버튼에 맞게 조정 */
      border: none;
      border-radius: 8px;
      background: #000033;
      color: #333333;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
    }

    button:active {
      background: #000022;
    }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAQGtOEcxFxl9FV7NASLgxLDc23u2vzS_0",
      authDomain: "mygps-11798.firebaseapp.com",
      databaseURL: "https://mygps-11798-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "mygps-11798",
      storageBucket: "mygps-11798.firebasestorage.app",
      messagingSenderId: "271371741627",
      appId: "1:271371741627:web:642901f43c5ad57d80bc9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.mapLevel = 4;

    function uploadLocation(lat, lng) {
      set(ref(db, "location/current"), {
        lat: lat,
        lng: lng,
        level: window.mapLevel,
        timestamp: Date.now()
      });
    }

    window.onload = function() {
      const levelDisplay = document.getElementById('level-display');
      const zoomInBtn = document.getElementById('zoom-in');
      const zoomOutBtn = document.getElementById('zoom-out');

      function updateLevelDisplay() {
        levelDisplay.textContent = window.mapLevel;
      }

      updateLevelDisplay();

      zoomInBtn.onclick = () => { if (window.mapLevel > 1) window.mapLevel--; updateLevelDisplay(); };
      zoomOutBtn.onclick = () => { window.mapLevel++; updateLevelDisplay(); };

      if (navigator.geolocation) {
        navigator.geolocation.watchPosition(
          (pos) => uploadLocation(pos.coords.latitude, pos.coords.longitude),
          (err) => console.error(err),
          { enableHighAccuracy: true }
        );
      } else {
        alert("GPS를 지원하지 않는 기기입니다.");
      }
    };
  </script>
</head>
<body>

  <div id="status-text">📍 GPS 업로드 중...</div>
  <div id="level-display">4</div>

  <div class="buttons">
    <button id="zoom-in">+</button>
    <button id="zoom-out">-</button>
  </div>

</body>
</html>
