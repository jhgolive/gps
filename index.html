<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GPS 업로드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 20px 10px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      min-height: 100vh;
      box-sizing: border-box;
      background: #f0f0f0;
      color: #333333; /* 글자 어두운 회색 */
      text-align: center;
    }

    .control-container {
      width: 66%; /* 화면 가로 2/3 */
      max-width: 500px;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
      gap: 10px;
    }

    #status-text {
      font-size: 24px;
      color: #333333;  /* 어두운 회색 */
      margin-bottom: 10px;
    }

    #level-display {
      font-size: 40px;      /* 레벨 표시 크게 */
      font-weight: bold;
      color: #333333;       /* 어두운 회색 */
      margin-bottom: 5px;
    }

    .buttons {
      display: flex;
      gap: 2px;             /* 버튼 붙임 */
      width: 100%;
    }

    button {
      flex: 1 1 0;
      font-size: 72px;      /* 글자 크게 */
      padding: 20px 0;
      border-radius: 8px;
      border: none;
      background: #000033;  /* 더 어두운 남색 */
      color: #333333;       /* 글자 어두운 회색 */
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
    }

    button:active {
      background: #000022;  /* 누를 때 색상 */
    }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAQGtOEcxFxl9FV7NASLgxLDc23u2vzS_0",
      authDomain: "mygps-11798.firebaseapp.com",
      databaseURL: "https://mygps-11798-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "mygps-11798",
      storageBucket: "mygps-11798.firebasestorage.app",
      messagingSenderId: "271371741627",
      appId: "1:271371741627:web:642901f43c5ad57d80bc9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.mapLevel = 4;

    function uploadLocation(lat, lng) {
      set(ref(db, "location/current"), {
        lat: lat,
        lng: lng,
        level: window.mapLevel,
        timestamp: Date.now()
      });
    }

    window.onload = function() {
      const levelDisplay = document.getElementById('level-display');
      const zoomInBtn = document.getElementById('zoom-in');
      const zoomOutBtn = document.getElementById('zoom-out');

      function updateLevelDisplay() {
        levelDisplay.textContent = window.mapLevel;
      }

      updateLevelDisplay();

      zoomInBtn.onclick = () => { if (window.mapLevel > 1) window.mapLevel--; updateLevelDisplay(); };
      zoomOutBtn.onclick = () => { window.mapLevel++; updateLevelDisplay(); };

      if (navigator.geolocation) {
        navigator.geolocation.watchPosition(
          (pos) => uploadLocation(pos.coords.latitude, pos.coords.longitude),
          (err) => console.error(err),
          { enableHighAccuracy: true }
        );
      } else {
        alert("GPS를 지원하지 않는 기기입니다.");
      }
    };
  </script>
</head>
<body>

  <div class="control-container">
    <div id="status-text">📍 GPS 업로드 중...</div>
    <div id="level-display">4</div>
    <div class="buttons">
      <button id="zoom-in">+</button>
      <button id="zoom-out">-</button>
    </div>
  </div>

</body>
</html>
