<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GPS 업로드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px 10px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      height: 100vh;
      box-sizing: border-box;
    }
    .control-container {
      width: 100%;
      position: fixed;
      bottom: 0;
      left: 0;
      background: rgba(255, 255, 255, 0.9);
      padding: 20px 10px;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #level-display {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .control-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      width: 100%;
    }
    button {
      flex: 1;
      font-size: 32px;
      padding: 25px 0;
      border-radius: 12px;
      border: none;
      background: #4CAF50;
      color: white;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
    }
    button:active {
      background: #45a049;
    }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAQGtOEcxFxl9FV7NASLgxLDc23u2vzS_0",
      authDomain: "mygps-11798.firebaseapp.com",
      databaseURL: "https://mygps-11798-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "mygps-11798",
      storageBucket: "mygps-11798.firebasestorage.app",
      messagingSenderId: "271371741627",
      appId: "1:271371741627:web:642901f43c5ad57d80bc9e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.mapLevel = 4;

    function uploadLocation(lat, lng) {
      set(ref(db, "location/current"), {
        lat: lat,
        lng: lng,
        level: window.mapLevel,
        timestamp: Date.now()
      });
    }

    window.onload = function() {
      const levelDisplay = document.getElementById('level-display');
      const zoomInBtn = document.getElementById('zoom-in');
      const zoomOutBtn = document.getElementById('zoom-out');

      function updateLevelDisplay() {
        levelDisplay.textContent = window.mapLevel;
      }

      // 초기 표시
      updateLevelDisplay();

      // 버튼 이벤트
      zoomInBtn.onclick = () => { if (window.mapLevel > 1) window.mapLevel--; updateLevelDisplay(); };
      zoomOutBtn.onclick = () => { window.mapLevel++; updateLevelDisplay(); };

      // GPS 업로드
      if (navigator.geolocation) {
        navigator.geolocation.watchPosition(
          (pos) => uploadLocation(pos.coords.latitude, pos.coords.longitude),
          (err) => console.error(err),
          { enableHighAccuracy: true }
        );
      } else {
        alert("GPS를 지원하지 않는 기기입니다.");
      }
    };
  </script>
</head>
<body>
  <h2>📍 GPS 업로드 중...</h2>

  <div class="control-container">
    <span id="level-display">4</span>
    <div class="control-buttons">
      <button id="zoom-in">🔍 확대</button>
      <button id="zoom-out">🔎 축소</button>
    </div>
  </div>
</body>
</html>
