<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS 업로드</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  padding: 10px;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #f0f0f0;
  text-align: center;
  user-select: none;
}
#status-text { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
.btn-row { display: flex; align-items: center; gap: 2px; margin-bottom: 2px; }
.btn-label { font-size: 18px; width: 50px; text-align: right; font-weight: bold; }
button {
  width: 80px; height: 80px; font-size: 28px;
  border: none; border-radius: 12px; background: #000033; color: #fff;
  cursor: pointer; user-select: none; transition: background 0.1s;
}
button.active { background: #000088; }
</style>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQGtOEcxFxl9FV7NASLgxLDc23u2vzS_0",
  authDomain: "mygps-11798.firebaseapp.com",
  databaseURL: "https://mygps-11798-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mygps-11798",
  storageBucket: "mygps-11798.firebasestorage.app",
  messagingSenderId: "271371741627",
  appId: "1:271371741627:web:642901f43c5ad57d80bc9e"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.mapLevel = 4;
window.borderRadius = 0;
window.mapOpacity = 1;
window.mapSize = 200;

const MAX_RADIUS = 160, MIN_MOVE = 0.00005, MAX_SIZE = 600, MIN_SIZE = 100;
let prevPos = null;

function distance(lat1, lng1, lat2, lng2) {
  return Math.sqrt((lat2 - lat1)**2 + (lng2 - lng1)**2);
}

function uploadLocation(lat, lng) {
  set(ref(db, "location/current"), {
    lat, lng,
    level: window.mapLevel,
    borderRadius: window.borderRadius,
    opacity: window.mapOpacity,
    mapSize: window.mapSize,
    timestamp: Date.now()
  });
}

// ✅ 다크모드 저장
function setDarkMode(value) {
  set(ref(db, "location/settings/darkMode"), value);
}

window.onload = function() {
  // ... 기존 버튼 세팅 (zoom, opacity 등) 그대로 ...

  // ✅ 다크모드 버튼 이벤트
  document.getElementById("dark-on").addEventListener("click", () => setDarkMode(true));
  document.getElementById("dark-off").addEventListener("click", () => setDarkMode(false));

  if(navigator.geolocation){
    navigator.geolocation.watchPosition(
      (pos) => {
        if(prevPos){
          const moveDist = distance(prevPos.lat, prevPos.lng, pos.coords.latitude, pos.coords.longitude);
          if(moveDist >= MIN_MOVE){
            prevPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          }
        } else {
          prevPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        }
        uploadLocation(pos.coords.latitude, pos.coords.longitude);
      },
      (err) => console.error(err),
      { enableHighAccuracy: true }
    );
  } else { alert("GPS를 지원하지 않는 기기입니다."); }
};
</script>
</head>
<body>
  <div id="status-text">GPS 업로드 중...</div>

  <!-- 기존 버튼들 (opacity, radius, size, zoom) 그대로 -->

  <div class="btn-row">
    <div class="btn-label">Dark</div>
    <button id="dark-on">ON</button>
    <button id="dark-off">OFF</button>
  </div>
</body>
</html>
