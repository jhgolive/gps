<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS 업로드</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* 기본 body 스타일 설정 */
body {
  margin: 0;
  padding: 10px;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #f0f0f0;
  text-align: center;
  user-select: none; /* 텍스트 선택 방지 */
}

/* GPS 상태 텍스트 스타일 */
#status-text { 
  font-size: 24px; 
  font-weight: bold; 
  margin-bottom: 10px; 
}

/* 버튼 행 스타일 */
.btn-row {
  display: flex;
  align-items: center;
  gap: 2px;
  margin-bottom: 2px;
}

/* 버튼 라벨 스타일 */
.btn-label {
  font-size: 18px;
  width: 50px;
  text-align: right;
  font-weight: bold;
}

/* 버튼 기본 스타일 */
button {
  width: 80px;
  height: 80px;
  font-size: 36px;
  border: none;
  border-radius: 12px;
  background: #000033;
  color: #fff;
  cursor: pointer;
  user-select: none;
  transition: background 0.1s;
}

/* 버튼이 눌린 상태 스타일 */
button.active {
  background: #3333ff; /* 밝은 파랑 */
}
</style>

<script type="module">
/* Firebase 앱 및 DB 초기화 */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQGtOEcxFxl9FV7NASLgxLDc23u2vzS_0",
  authDomain: "mygps-11798.firebaseapp.com",
  databaseURL: "https://mygps-11798-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mygps-11798",
  storageBucket: "mygps-11798.firebasedestorage.app",
  messagingSenderId: "271371741627",
  appId: "1:271371741627:web:642901f43c5ad57d80bc9e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* 전역 변수 초기화 */
window.mapLevel = 4;
window.borderRadius = 0;
window.mapOpacity = 1;
window.mapSize = 200;
const MAX_RADIUS = 300;
const MIN_MOVE = 0.00005;  // 약 5m
const MAX_SIZE = 600;
const MIN_SIZE = 100;

let prevPos = null; // 이전 GPS 위치

/* 쓰로틀 업로드용 변수 */
let lastUploadTime = 0;
const UPLOAD_INTERVAL = 3000; // 3초 간격

/* Firebase 업로드 함수 */
function uploadLocation(lat, lng) {
  set(ref(db, "location/current"), {
    lat, lng,
    level: window.mapLevel,
    borderRadius: window.borderRadius,
    opacity: window.mapOpacity,
    mapSize: window.mapSize,
    timestamp: Date.now()
  });
}

function uploadSettings() {
  set(ref(db, "location/settings"), {
    level: window.mapLevel,
    borderRadius: window.borderRadius,
    opacity: window.mapOpacity,
    mapSize: window.mapSize,
    timestamp: Date.now()
  });
}

/* 쓰로틀 처리된 Settings 업로드 */
function throttledUploadSettings() {
  const now = Date.now();
  if (now - lastUploadTime >= UPLOAD_INTERVAL) {
    uploadSettings();
    lastUploadTime = now;
  }
}

/* 모드 전환 (0: 일반, 1: 다크, 2: 투명) */
let modeIndex = 0;
function toggleMode(isLeftButton) {
  if (isLeftButton) { 
    if (modeIndex > 0) modeIndex--;
  } else { 
    if (modeIndex < 2) modeIndex++;
  }
  set(ref(db, "location/settings/mode"), modeIndex);
  throttledUploadSettings();
}

/* 두 좌표 간 거리 계산 (간단히 유클리드 거리) */
function distance(lat1, lng1, lat2, lng2) {
  return Math.sqrt((lat2 - lat1)**2 + (lng2 - lng1)**2);
}

window.onload = function() {
  /* 버튼 요소 가져오기 */
  const zoomInBtn = document.getElementById('zoom-in');
  const zoomOutBtn = document.getElementById('zoom-out');
  const rounderInBtn = document.getElementById('rounder-in');
  const rounderOutBtn = document.getElementById('rounder-out');
  const opacityUpBtn = document.getElementById('opacityUp');
  const opacityDownBtn = document.getElementById('opacityDown');
  const sizeUpBtn = document.getElementById('size-up');
  const sizeDownBtn = document.getElementById('size-down');
  const darkOffBtn = document.getElementById("dark-off");
  const darkOnBtn = document.getElementById("dark-on");

  /* 라벨 요소 */
  const opacityLabel = document.getElementById('opacity-label');
  const radiusLabel = document.getElementById('radius-label');
  const levelLabel = document.getElementById('level-label');
  const sizeLabel = document.getElementById('size-label');

  /* 라벨 표시 업데이트 */
  function updateDisplays() {
    opacityLabel.textContent = window.mapOpacity.toFixed(2);
    radiusLabel.textContent = window.borderRadius;
    levelLabel.textContent = window.mapLevel;
    sizeLabel.textContent = window.mapSize;
  }
  updateDisplays();

  /* 버튼 값 변경 함수들 */
  function changeOpacity(delta) {
    window.mapOpacity = Math.min(1, Math.max(0.1, window.mapOpacity + delta));
    updateDisplays();
    throttledUploadSettings();
  }
  function changeRadius(delta) {
    window.borderRadius = Math.min(MAX_RADIUS, Math.max(0, window.borderRadius + delta));
    updateDisplays();
    throttledUploadSettings();
  }
  function changeZoom(delta) {
    window.mapLevel = Math.min(14, Math.max(1, window.mapLevel + delta));
    updateDisplays();
    throttledUploadSettings();
  }
  function changeMapSize(delta) {
    window.mapSize = Math.min(MAX_SIZE, Math.max(MIN_SIZE, window.mapSize + delta));
    updateDisplays();
    throttledUploadSettings();
  }

  /* 버튼 장기/단기 클릭 이벤트 */
  function addHoldEvent(button, delta, func) {
    let interval = null;
    let timeout = null;
    let longPress = false;
    const startChange = () => {
      longPress = true;
      interval = setInterval(() => func(delta), 150);
    };
    button.addEventListener('mousedown', () => {
      button.classList.add('active');
      longPress = false;
      timeout = setTimeout(startChange, 500);
    });
    button.addEventListener('mouseup', () => {
      button.classList.remove('active');
      clearTimeout(timeout);
      clearInterval(interval);
      if (!longPress) func(delta); 
    });
    button.addEventListener('mouseleave', () => {
      button.classList.remove('active');
      clearTimeout(timeout);
      clearInterval(interval);
    });
    button.addEventListener('touchstart', (e) => {
      e.preventDefault();
      button.classList.add('active');
      longPress = false;
      timeout = setTimeout(startChange, 500);
    });
    button.addEventListener('touchend', () => {
      button.classList.remove('active');
      clearTimeout(timeout);
      clearInterval(interval);
      if (!longPress) func(delta);
    });
    button.addEventListener('touchcancel', () => {
      button.classList.remove('active');
      clearTimeout(timeout);
      clearInterval(interval);
    });
  }

  /* 버튼 이벤트 연결 */
  addHoldEvent(opacityUpBtn, 0.05, changeOpacity);
  addHoldEvent(opacityDownBtn, -0.05, changeOpacity);
  addHoldEvent(rounderInBtn, 10, changeRadius);
  addHoldEvent(rounderOutBtn, -10, changeRadius);
  addHoldEvent(zoomInBtn, 1, changeZoom);
  addHoldEvent(zoomOutBtn, -1, changeZoom);
  addHoldEvent(sizeUpBtn, 20, changeMapSize);
  addHoldEvent(sizeDownBtn, -20, changeMapSize);
  addHoldEvent(darkOffBtn, null, () => toggleMode(true));
  addHoldEvent(darkOnBtn, null, () => toggleMode(false));

  /* GPS 업로드 시작 */
  if(navigator.geolocation){
    navigator.geolocation.watchPosition(
      (pos) => {
        if (prevPos) {
          const moveDist = distance(prevPos.lat, prevPos.lng, pos.coords.latitude, pos.coords.longitude);
          if (moveDist >= MIN_MOVE) {
            prevPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            uploadLocation(pos.coords.latitude, pos.coords.longitude);
          }
        } else {
          prevPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          uploadLocation(pos.coords.latitude, pos.coords.longitude);
        }
      },
      (err) => console.error(err),
      { enableHighAccuracy: true }
    );
  } else { alert("GPS를 지원하지 않는 기기입니다."); }
};
</script>
</head>

<body>
  <!-- 상태 표시 -->
  <div id="status-text">GPS 업로드 중...</div>

  <!-- 모드 선택 버튼 -->
  <div class="btn-row">
    <div class="btn-label">mode</div>
    <button id="dark-off">★</button>
    <button id="dark-on">☆</button>
  </div>
  
  <!-- 투명도 조절 버튼 -->
  <div class="btn-row">
    <div class="btn-label" id="opacity-label">1.00</div>
    <button id="opacityUp">◆</button>
    <button id="opacityDown">◇</button>
  </div>

  <!-- 라운드 조절 버튼 -->
  <div class="btn-row">
    <div class="btn-label" id="radius-label">0</div>
    <button id="rounder-out">□</button>
    <button id="rounder-in">○</button>
  </div>

  <!-- 지도 크기 조절 버튼 -->
  <div class="btn-row">
    <div class="btn-label" id="size-label">200</div>
    <button id="size-up">+</button>
    <button id="size-down">-</button>
  </div>

  <!-- 지도 레벨 조절 버튼 -->
  <div class="btn-row">
    <div class="btn-label" id="level-label">4</div>
    <button id="zoom-out"><></button>  
    <button id="zoom-in">><</button>   
  </div>
</body>
</html>
